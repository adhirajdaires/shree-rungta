<title>Shree Rungta — Apka Apna Mart</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{--gold:#D4AF37;--bg:#0b0b0b;}
body{margin:0;background:var(--bg);color:#fff;font-family:Poppins,sans-serif}

header{background:#000;text-align:center;padding:18px;border-bottom:1px solid #222}
header h1{margin:0;font-family:Cinzel,serif;color:var(--gold)}
.tag{font-family:"Playfair Display",serif;color:#d6c27a;font-style:italic}

.categories{display:flex;gap:18px;padding:14px;overflow-x:auto;background:#000}
.cat{text-align:center;min-width:90px;cursor:pointer}
.cat img{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.cat span{display:block;font-size:13px;margin-top:6px}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:18px;padding:18px;
}

.card{background:#111;border-radius:16px;overflow:hidden;transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-6px);box-shadow:0 0 18px rgba(212,175,55,.5)}
.card img{width:100%;height:180px;object-fit:cover}
.card h3{margin:8px;font-size:15px}
.price{color:var(--gold);margin:0 8px 10px;font-weight:600}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);overflow:auto;z-index:1000;padding:20px}
.modal-content{max-width:900px;margin:auto;background:#111;border-radius:18px;padding:20px}
.modal img{width:100%;border-radius:12px}

.recommend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}

.cart-btn{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;padding:14px;border-radius:50%;font-weight:bold;cursor:pointer}
.cart{display:none;position:fixed;right:0;bottom:0;width:300px;max-height:80vh;background:#000;padding:16px;overflow:auto;border-top-left-radius:18px}
.cart-item{display:flex;gap:10px;margin-bottom:12px}
.cart-item img{width:50px;height:50px;border-radius:8px;object-fit:cover}
.total{color:var(--gold);font-weight:700;margin-top:10px}

button{background:var(--gold);border:none;padding:7px 10px;border-radius:6px;font-weight:600;cursor:pointer}
</style>
</head>

<body>

<header>
<h1>Shree Rungta</h1>
<div class="tag">Apka Apna Mart</div>
</header>

<div class="categories" id="categories"></div>
<div class="products" id="products"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<div class="total" id="total"></div>

<form action="https://formspree.io/f/mbdzkzbv" method="POST" onsubmit="prepareOrder()">
<input type="hidden" name="order" id="orderData">
<input type="text" name="name" placeholder="Name" required style="width:100%;margin:5px 0">
<input type="tel" name="phone" placeholder="Phone" required style="width:100%;margin:5px 0">
<textarea name="address" placeholder="Address" required style="width:100%;margin:5px 0"></textarea>
<button type="submit">Place Order</button>
</form>
</div>
