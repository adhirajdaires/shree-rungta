<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Rungta — Apka Apna Mart</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#D4AF37;
--bg:#0b0b0b;
}

body{
margin:0;
background:var(--bg);
color:#fff;
font-family:Poppins,sans-serif;
}

/* HEADER */

header{
background:#000;
padding:18px;
text-align:center;
border-bottom:1px solid #222;
}

header h1{
font-family:Cinzel,serif;
color:var(--gold);
margin:0;
}

.tag{
font-family:"Playfair Display",serif;
color:#d6c27a;
font-style:italic;
}

/* CATEGORY BAR */

.categories{
display:flex;
gap:18px;
padding:14px;
overflow-x:auto;
background:#000;
}

.cat{
min-width:90px;
text-align:center;
cursor:pointer;
}

.cat img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--gold);
box-shadow:0 0 12px rgba(212,175,55,.5);
}

.cat span{
display:block;
margin-top:6px;
font-size:13px;
}

/* PRODUCTS GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:22px;
padding:22px;
}

.card{
background:#111;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.35s;
box-shadow:0 0 12px rgba(0,0,0,.6);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(212,175,55,.45);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
font-family:"Playfair Display",serif;
padding:10px 12px 0;
margin:0;
font-size:16px;
}

.price{
color:var(--gold);
padding:0 12px 12px;
font-weight:600;
}

/* PRODUCT MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
overflow:auto;
padding:20px;
z-index:1000;
}

.modal-content{
max-width:900px;
margin:auto;
background:#111;
border-radius:18px;
padding:20px;
}

.modal img{
width:100%;
border-radius:14px;
}

.recommend-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:14px;
margin-top:18px;
}

/* CART */

.cart{
position:fixed;
bottom:0;
right:0;
background:#000;
padding:14px;
border-top-left-radius:18px;
max-height:70vh;
overflow:auto;
width:270px;
box-shadow:0 0 18px rgba(0,0,0,.8);
}

.cart-item{
display:flex;
gap:10px;
margin-bottom:12px;
}

.cart-item img{
width:52px;
height:52px;
object-fit:cover;
border-radius:8px;
}

button{
background:var(--gold);
border:none;
padding:8px 12px;
border-radius:8px;
font-weight:600;
cursor:pointer;
margin-top:6px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:80px;
right:14px;
background:#25D366;
color:#fff;
padding:12px 16px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<header>
<h1>Shree Rungta</h1>
<div class="tag">Apka Apna Mart</div>
</header>

<div class="categories" id="categories"></div>

<div class="products" id="products"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cartItems"></div>
</div>

<a class="whatsapp" href="https://wa.me/message/VAJATH3WMWHWA1" target="_blank">Chat on WhatsApp</a>

<script>

/* ================= PRODUCTS ================= */

const products = [
{id:1,name:"Couple Showpiece",price:1080,cat:"Home Decor",img:"https://i.ibb.co/YTkSwsz6/17734751638875328563538152127249.jpg"},
{id:2,name:"Scratch Art Book",price:90,cat:"Stationery",img:"https://i.ibb.co/4ZYQNjFQ/IMG-20260314-144746-609.jpg"},
{id:3,name:"Spring Notebook (Boys)",price:120,cat:"Stationery",img:"https://i.ibb.co/Cp8QVSNk/IMG-20260314-144722-974.jpg"},
{id:4,name:"Spring Notebook (Girls)",price:120,cat:"Stationery",img:"https://i.ibb.co/wnv9yZ9/IMG-20260314-144713-356.jpg"},
{id:5,name:"Artificial Plant Vase",price:240,cat:"Home Decor",img:"https://i.ibb.co/b4k2MQ0/IMG-20260314-144403-990.jpg"},
{id:6,name:"Clock Showpiece",price:880,cat:"Home Decor",img:"https://i.ibb.co/KcGv9hL4/IMG-20260314-144339-306.jpg"},
{id:7,name:"Luggage Tag Red",price:75,cat:"Travel",img:"https://i.ibb.co/V0S8Fk2M/IMG-20260314-144244-309.jpg"},
{id:8,name:"Luggage Tag Blue",price:70,cat:"Travel",img:"https://i.ibb.co/d4H0mmX6/IMG-20260314-144236-727.jpg"},
{id:9,name:"Key Holder",price:170,cat:"Household",img:"https://i.ibb.co/bVsJpgV/IMG-20260314-144226-473.jpg"},
{id:10,name:"EPILATOR Hair Remover",price:150,cat:"Household",img:"https://i.ibb.co/QvhnZGt0/IMG-20260314-143944-826.jpg"},
{id:20,name:"Drift Car",price:250,cat:"Toys",img:"https://i.ibb.co/7Nbqg82z/IMG-20260314-143541-455.jpg"},
{id:24,name:"Remote Control Car",price:520,cat:"Toys",img:"https://i.ibb.co/gLxN6s7t/IMG-20260314-143426-581.jpg"},
{id:33,name:"Haldi Powder",price:250,cat:"Foods",img:"https://i.ibb.co/SwjH13Q9/IMG-20260314-144640-494.jpg"},
{id:35,name:"Ice Cream Supari",price:130,cat:"Mouth Fresheners",img:"https://i.ibb.co/bRmT2yMM/IMG-20260314-144613-907.jpg"},
{id:48,name:"Branded Suitcase Small",price:4800,cat:"Travel",img:"https://i.ibb.co/ynfqbgjr/IMG-20260314-173255-635.jpg"}
];

/* ================= CATEGORY ICONS ================= */

const cats=[...new Set(products.map(p=>p.cat))];
const catDiv=document.getElementById("categories");

cats.forEach(c=>{
const hero=products.find(p=>p.cat===c).img;
catDiv.innerHTML+=`
<div class="cat" onclick="filterCat('${c}')">
<img src="${hero}">
<span>${c}</span>
</div>`;
});

/* ================= PRODUCTS GRID ================= */

function showProducts(list){
const box=document.getElementById("products");
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}" loading="lazy">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>`;
});
}

showProducts(products);

function filterCat(c){
showProducts(products.filter(p=>p.cat===c));
}

/* ================= PRODUCT PAGE ================= */

function openProduct(id){
const p=products.find(x=>x.id===id);
const related=products.filter(x=>x.cat===p.cat && x.id!==p.id);

document.getElementById("modalContent").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p>₹${p.price}</p>
<button onclick="addToCart(${p.id})">Add to Cart</button>

<h3>You may also like</h3>
<div class="recommend-grid">
${related.map(r=>`
<div class="card" onclick="openProduct(${r.id})">
<img src="${r.img}">
<h3>${r.name}</h3>
<div class="price">₹${r.price}</div>
</div>`).join("")}
</div>
`;

document.getElementById("modal").style.display="block";
}

window.onclick=e=>{
if(e.target.id==="modal")
document.getElementById("modal").style.display="none";
}

/* ================= CART ================= */

const cart=[];

function addToCart(id){
const p=products.find(x=>x.id===id);
cart.push(p);

document.getElementById("cartItems").innerHTML+=`
<div class="cart-item">
<img src="${p.img}">
<div>${p.name}<br>₹${p.price}</div>
</div>`;
}

</script>

</body>
</html>
