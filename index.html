<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Rungta — Apka Apna Mart</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{--gold:#D4AF37;--bg:#0a0a0a;}
body{margin:0;background:var(--bg);color:#fff;font-family:Poppins,sans-serif}

/* HEADER */
header{text-align:center;padding:18px;border-bottom:1px solid #222;background:#000}
header h1{font-family:Cinzel,serif;color:var(--gold);letter-spacing:2px;margin:0}
.tag{font-family:"Playfair Display",serif;color:#d6c27a;font-style:italic}

/* CATEGORIES */
.categories{display:flex;gap:16px;padding:16px;overflow-x:auto}
.cat{min-width:90px;text-align:center;cursor:pointer}
.cat img{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.cat span{display:block;margin-top:6px;font-size:13px}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding:20px
}

.card{
background:#111;
border-radius:16px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,.6);
transition:.3s;
cursor:pointer
}
.card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(212,175,55,.4)
}
.card img{width:100%;height:170px;object-fit:cover}
.card h3{font-family:"Playfair Display",serif;padding:8px 12px 0;margin:0}
.price{color:var(--gold);padding:0 12px 12px;font-weight:600}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.92);overflow:auto;padding:20px
}
.modal-content{
max-width:820px;margin:auto;background:#111;border-radius:16px;padding:20px
}
.modal img{width:100%;border-radius:12px}

/* RECOMMEND */
.recommend{margin-top:20px}
.recommend-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:12px
}

/* CART */
.cart{
position:fixed;bottom:0;right:0;background:#000;padding:12px;
border-top-left-radius:16px;max-height:60vh;overflow:auto
}
.cart-item{display:flex;gap:10px;margin-bottom:8px}
.cart-item img{width:45px;height:45px;object-fit:cover;border-radius:6px}

button{
background:var(--gold);
border:none;padding:8px 12px;border-radius:6px;
font-weight:600;cursor:pointer
}
</style>
</head>

<body>

<header>
<h1>Shree Rungta</h1>
<div class="tag">Apka Apna Mart</div>
</header>

<div class="categories" id="categories"></div>
<div class="products" id="products"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="cart">
<h3>Cart 🛒</h3>
<div id="cartItems"></div>
</div>

<script>

/* ======= PRODUCTS DATABASE ======= */

const products=[

/* TRAVEL */
{id:1,name:"Premium Travel Backpack",price:1299,cat:"Travel",img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{id:2,name:"Hard Shell Trolley Bag",price:2499,cat:"Travel",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{id:3,name:"Passport Organizer",price:399,cat:"Travel",img:"https://images.unsplash.com/photo-1502920917128-1aa500764b8a"},

/* HOME DECOR */
{id:4,name:"Luxury Wall Clock",price:699,cat:"Home Decor",img:"https://images.unsplash.com/photo-1505691938895-1758d7feb511"},
{id:5,name:"LED Decorative Lamp",price:499,cat:"Home Decor",img:"https://images.unsplash.com/photo-1507473885765-e6ed057f782c"},
{id:6,name:"Artificial Flower Vase",price:349,cat:"Home Decor",img:"https://images.unsplash.com/photo-1493666438817-866a91353ca9"},

/* BEAUTY */
{id:7,name:"Face Cream",price:249,cat:"Beauty",img:"https://images.unsplash.com/photo-1556228720-195a672e8a03"},
{id:8,name:"Vitamin C Serum",price:399,cat:"Beauty",img:"https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd"},
{id:9,name:"Perfume Spray",price:599,cat:"Beauty",img:"https://images.unsplash.com/photo-1594035910387-fea47794261f"},

/* TOYS */
{id:10,name:"Remote Control Car",price:799,cat:"Toys",img:"https://images.unsplash.com/photo-1581235720704-06d3acfcb36f"},
{id:11,name:"Teddy Bear",price:499,cat:"Toys",img:"https://images.unsplash.com/photo-1517841905240-472988babdf9"},
{id:12,name:"Building Blocks Set",price:699,cat:"Toys",img:"https://images.unsplash.com/photo-1587654780291-39c9404d746b"},

/* STATIONERY */
{id:13,name:"Notebook Pack",price:199,cat:"Stationery",img:"https://images.unsplash.com/photo-1519682337058-a94d519337bc"},
{id:14,name:"Premium Pen Set",price:149,cat:"Stationery",img:"https://images.unsplash.com/photo-1583484963886-cfe2bff2945f"},
{id:15,name:"School Bag",price:799,cat:"Stationery",img:"https://images.unsplash.com/photo-1588072432836-e10032774350"},

/* FOODS */
{id:16,name:"Chocolate Gift Pack",price:299,cat:"Foods",img:"https://images.unsplash.com/photo-1511389026070-a14ae610a1be"},
{id:17,name:"Dry Fruits Box",price:499,cat:"Foods",img:"https://images.unsplash.com/photo-1604908176997-43132d8c3e5b"},
{id:18,name:"Instant Noodles Pack",price:99,cat:"Foods",img:"https://images.unsplash.com/photo-1604908554021-3a0d6b5a16c6"},

/* MOUTH FRESHENERS */
{id:19,name:"Elaichi Pack",price:79,cat:"Mouth Fresheners",img:"https://images.unsplash.com/photo-1587049352846-4a222e784d38"},
{id:20,name:"Mint Tablets",price:59,cat:"Mouth Fresheners",img:"https://images.unsplash.com/photo-1590080877777-7a0c43a3e1f7"},

/* FASHION */
{id:21,name:"Men Casual T-Shirt",price:399,cat:"Fashion",img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{id:22,name:"Women Handbag",price:699,cat:"Fashion",img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
{id:23,name:"Stylish Sunglasses",price:249,cat:"Fashion",img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},

/* ELECTRONICS */
{id:24,name:"Bluetooth Earbuds",price:899,cat:"Electronics",img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{id:25,name:"Power Bank",price:699,cat:"Electronics",img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
{id:26,name:"LED Study Lamp",price:499,cat:"Electronics",img:"https://images.unsplash.com/photo-1519710164239-da123dc03ef4"},

/* UTILITY */
{id:27,name:"Steel Water Bottle",price:299,cat:"Utility",img:"https://images.unsplash.com/photo-1600180758890-6c7b6c6d5b18"},
{id:28,name:"Lunch Box",price:349,cat:"Utility",img:"https://images.unsplash.com/photo-1604908176997-43132d8c3e5b"},
{id:29,name:"Rechargeable Torch",price:399,cat:"Utility",img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e"}

];

/* ======= CATEGORY HERO ICONS ======= */

const categories=[...new Set(products.map(p=>p.cat))];
const catBox=document.getElementById("categories");

categories.forEach(c=>{
const hero=products.find(p=>p.cat===c).img;
catBox.innerHTML+=`
<div class="cat" onclick="filterCat('${c}')">
<img src="${hero}">
<span>${c}</span>
</div>`;
});

/* ======= SHOW PRODUCTS ======= */

function showProducts(list){
const box=document.getElementById("products");
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>`;
});
}

showProducts(products);

function filterCat(c){
showProducts(products.filter(p=>p.cat===c));
}

/* ======= PRODUCT MODAL ======= */

function openProduct(id){
const p=products.find(x=>x.id===id);
const related=products.filter(x=>x.cat===p.cat && x.id!==p.id);

document.getElementById("modalContent").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p>₹${p.price}</p>
<button onclick="addToCart(${p.id})">Add to Cart</button>

<div class="recommend">
<h3>You may also like</h3>
<div class="recommend-grid">
${related.map(r=>`
<div class="card" onclick="openProduct(${r.id})">
<img src="${r.img}">
<h3>${r.name}</h3>
<div class="price">₹${r.price}</div>
</div>`).join("")}
</div>
</div>
`;

document.getElementById("modal").style.display="block";
}

window.onclick=e=>{
if(e.target.id==="modal")
document.getElementById("modal").style.display="none";
};

/* ======= CART ======= */

function addToCart(id){
const p=products.find(x=>x.id===id);
document.getElementById("cartItems").innerHTML+=`
<div class="cart-item">
<img src="${p.img}">
<div>${p.name}<br>₹${p.price}</div>
</div>`;
}

</script>

</body>
</html>
