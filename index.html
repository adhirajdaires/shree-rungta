<style>
:root{--gold:#D4AF37;--black:#0a0a0a;--card:#161616}
*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Poppins',sans-serif;background:var(--black);color:#fff}

/* HEADER */
header{position:sticky;top:0;background:#000;padding:14px;text-align:center;border-bottom:2px solid var(--gold);z-index:100}
header h1{font-family:'Cinzel',serif;font-size:28px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;text-shadow:0 0 12px rgba(212,175,55,.5)}
.tag{font-family:'Playfair Display',serif;font-style:italic;color:#d6c27a;font-size:14px}

/* SEARCH */
.search{padding:12px;background:#000}
.search input{width:100%;padding:12px;border-radius:30px;border:none;background:#222;color:#fff;font-size:16px}

/* CATEGORIES */
.filters{display:flex;gap:8px;overflow-x:auto;padding:10px;background:#000}
.filters button{background:#1c1c1c;color:#fff;border:none;padding:8px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.filters button.active,.filters button:hover{background:var(--gold);color:#000}

/* PRODUCTS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;padding:14px}
.card{background:var(--card);border-radius:14px;overflow:hidden;transition:.25s;box-shadow:0 4px 14px rgba(0,0,0,.6)}
.card:hover{transform:translateY(-5px);box-shadow:0 8px 22px rgba(212,175,55,.25)}
.card img{width:100%;height:170px;object-fit:cover}
.info{padding:10px}
.card h3{font-family:'Playfair Display',serif;font-weight:600;font-size:17px}
.price{color:var(--gold);margin:6px 0;font-weight:600}
.card button{width:100%;background:var(--gold);border:none;padding:9px;border-radius:6px;font-weight:600;cursor:pointer;text-transform:uppercase}

/* CART BUTTON */
.cart-btn{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;border:none;padding:16px;border-radius:50%;font-size:22px;cursor:pointer;z-index:200}
.cart-count{position:absolute;top:-6px;right:-6px;background:#ff3b3b;border-radius:50%;padding:3px 7px;font-size:12px}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;z-index:300;overflow:auto}
.modal-content{background:#111;margin:40px auto;padding:20px;width:95%;max-width:520px;border-radius:12px}
.cart-item{display:flex;justify-content:space-between;margin-bottom:10px;border-bottom:1px solid #333;padding-bottom:8px}
.qty button{background:#333;border:none;color:#fff;padding:4px 8px;margin:0 2px}

/* WHATSAPP */
.whatsapp{position:fixed;left:18px;bottom:20px;background:#25D366;color:#fff;padding:12px 16px;border-radius:30px;text-decoration:none;font-weight:600}

/* FOOTER */
footer{background:#000;padding:20px;text-align:center;color:#ccc;margin-top:20px}
footer h3{color:var(--gold);margin-bottom:8px;font-family:'Cinzel',serif}
</style>
</head>

<input type="hidden" name="Order" id="orderField">
<button style="background:var(--gold);padding:10px;width:100%;border:none;margin-top:8px">Place Order</button>
</form>
<button onclick="closeCart()" style="margin-top:10px;width:100%">Close</button>
</div>
</div>

// ===== CATEGORY SYSTEM =====
const categories=["All",...new Set(products.map(p=>p.c))];
const filters=document.getElementById("filters");

categories.forEach(c=>{
const b=document.createElement("button");
b.textContent=c;
b.onclick=()=>{render(c);document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));b.classList.add("active")};
filters.appendChild(b);
});

let cart=JSON.parse(localStorage.getItem("cart")||"{}");

function render(cat="All"){
const grid=document.getElementById("grid");
const term=document.getElementById("search").value.toLowerCase();
grid.innerHTML="";

products.filter(p=>
(cat==="All"||p.c===cat)&&
p.n.toLowerCase().includes(term)
).forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.i}">
<div class="info">
<h3>${p.n}</h3>
<div class="price">₹${p.p}</div>
<button onclick="add(${i})">Add</button>
</div>
</div>`;
});
}

document.getElementById("search").oninput=()=>render();

function add(i){cart[i]=(cart[i]||0)+1;save()}
function save(){localStorage.setItem("cart",JSON.stringify(cart));count.textContent=Object.values(cart).reduce((a,b)=>a+b,0)}

function openCart(){
const list=document.getElementById("cartItems");
list.innerHTML="";let total=0;
for(let i in cart){
const p=products[i],q=cart[i];
total+=p.p*q;
list.innerHTML+=`<div class="cart-item"><div>${p.n}<br>₹${p.p} × ${q}</div><div class="qty"><button onclick="chg(${i},-1)">−</button><button onclick="chg(${i},1)">+</button><button onclick="del(${i})">✕</button></div></div>`;
}
totalEl.textContent="Total: ₹"+total;
cartModal.style.display="block";
}

function closeCart(){cartModal.style.display="none"}
function chg(i,d){cart[i]+=d;if(cart[i]<=0)delete cart[i];save();openCart()}
function del(i){delete cart[i];save();openCart()}

function prepareOrder(){
let txt="",total=0;
for(let i in cart){const p=products[i],q=cart[i];txt+=`${p.n} × ${q} = ₹${p.p*q}\n`;total+=p.p*q;}
txt+="Total: ₹"+total;
orderField.value=txt;
localStorage.removeItem("cart");
alert("Order placed! We will contact you on WhatsApp.");
}

render();save();
</script>
